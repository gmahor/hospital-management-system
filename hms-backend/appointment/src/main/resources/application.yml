server:
  port: 8082

spring:
  application:
    name: UserMS
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hms_db}
    username: ${DB_USERNAME:hms}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: Asia/Kolkata

  graphql:
    graphiql:
      enabled: true
      path: /graphql

gateway:
  service-url: ${GATEWAY_SERVICE_URL:http://localhost:9000}