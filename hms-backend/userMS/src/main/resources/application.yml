server:
  port: 8080

spring:
  application:
    name: UserMS
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hms_db}
    username: ${DB_USERNAME:hms}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect


jwt:
  secret: gm8206@1234#gmahor@gourav@2025&@
  access_token_expiration: 300000
  refresh_token_expiration: 604800000

gateway:
  service-url: ${GATEWAY_SERVICE_URL:http://localhost:9001}
#gateway:
#  service-url: ${GATEWAY_SERVICE_URL}



management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
